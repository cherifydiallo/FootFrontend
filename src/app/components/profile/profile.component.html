<div class="profile-container">
  <header class="page-header">
    <button class="back-btn" (click)="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m15 18-6-6 6-6"/>
      </svg>
      Retour
    </button>
    <h1 class="page-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
        <circle cx="12" cy="7" r="4"></circle>
      </svg>
      My Profile
    </h1>
  </header>

  <div class="profile-content">
    @if (loading()) {
      <div class="profile-card">
        <p>Loading profile...</p>
      </div>
    } @else {
      <div class="profile-card main-card">
        <div class="profile-header">
          <div class="avatar">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
          @if (currentUser()) {
            <div class="profile-info">
              <h2 class="profile-name">{{ currentUser().username || currentUser().identifiant || 'User' }}</h2>
              <p class="profile-email">{{ currentUser().email || '-' }}</p>
              <span class="profile-id">ID: {{ currentUser().id || '-' }}</span>
            </div>
          }
        </div>

        <div class="profile-actions">
          <button class="btn btn-primary">Role: {{ currentUser()?.role || 'standard' }}</button>
          <button class="btn btn-secondary" (click)="logout()">Logout</button>
        </div>
      </div>
    }
  </div>
</div>
